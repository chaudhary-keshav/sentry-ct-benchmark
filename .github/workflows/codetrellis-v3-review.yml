name: CodeTrellis AI PR Review (v3 Script)

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codetrellis-v3-review:
    name: CodeTrellis v3 Chunked Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CodeTrellis
        run: pip install codetrellis>=1.2.0

      - name: Scan codebase
        run: codetrellis scan . --optimal

      - name: Generate PR diff
        run: |
          MERGE_BASE=$(git merge-base origin/master HEAD)
          echo "Merge base: $MERGE_BASE"
          git diff "$MERGE_BASE"..HEAD > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"
          echo "Changed files: $(git diff --name-only "$MERGE_BASE"..HEAD | wc -l)"

      - name: Run v3 chunked agentic review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || '1' }}
          REPO: ${{ github.repository }}
          DIFF_FILE: /tmp/pr_diff.txt
          MAX_ROUNDS_PER_CHUNK: "5"
          CHUNK_SIZE: "3"
          INTER_CHUNK_DELAY: "65"
        run: python3 scripts/codetrellis-pr-reviewer.py
